<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Page | Abhay Gupta</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          crossorigin="anonymous">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <div class="row justify-content-center align-items-center vh-100">
        <div class="col-md-6">
            <div class="card shadow-lg p-4 rounded-4">

                <h3 class="card-title text-center mb-4">
                    <i class="bi bi-person-fill"></i> Register
                </h3>

                <form class="mt-3" method="post" action="register.php">

                    <div class="input-group mb-3">
                        <span class="input-group-text">
                            <i class="bi bi-person-fill"></i>
                        </span>
                        <input type="text" name="name" class="form-control" placeholder="Enter your name" required>
                    </div>

                    <div class="input-group mb-3">
                        <span class="input-group-text">
                            <i class="bi bi-envelope-fill"></i>
                        </span>
                        <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
                    </div>

                    <div class="input-group mb-3">
                        <span class="input-group-text">
                            <i class="bi bi-phone-fill"></i>
                        </span>
                        <input type="tel" name="phone" class="form-control" placeholder="Enter your phone number" required>
                    </div>

                    <div class="input-group mb-3">
                        <span class="input-group-text">
                            <i class="bi bi-lock-fill"></i>
                        </span>
                        <input type="password" id="password" name="password" class="form-control" placeholder="Enter your password" required>
                        <span class="input-group-text" id="togglePassword">
                            <i class="bi bi-eye-fill" id="eyeIcon"></i>
                        </span>
                    </div>

                    <div class="input-group mb-3">
                        <span class="input-group-text">
                            <i class="bi bi-lock-fill"></i>
                        </span>
                        <input type="password" id="confirmpassword" name="confirmpassword" class="form-control" placeholder="Confirm your password" required>
                        <span class="input-group-text" id="toggleConfirmpassword">
                            <i class="bi bi-eye-fill" id="confirmEyeIcon"></i>
                        </span>
                    </div>

                    <div class="form-check mb-3">
                        <input type="checkbox" name="validationCheck" class="form-check-input" id="validationCheck" required>
                        <label class="form-check-label" for="validationCheck">
                            I agree to the Terms & Conditions
                        </label>
                    </div>

                    <button type="submit" class="btn btn-success w-100">
                        Register
                    </button>

                    <div class="text-center mt-3">
                        <p>Already have an account? <a href="login.html">Login</a></p>
                    </div>

                </form>

            </div>
        </div>
    </div>
</div>

        <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"

            crossorigin="anonymous"></script>

    <script src="script.js"></script>
</body>

</html>
